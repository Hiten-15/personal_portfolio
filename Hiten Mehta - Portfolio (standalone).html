document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

d3; border-radius: 999px; padding: 5px 12px;\">Tailwind<\u002Fspan>\n          <span style=\"font-size: 12px; font-weight: 500; color: #21261f; background: #f6f4ee; border: 1px solid #e3dfd3; border-radius: 999px; padding: 5px 12px;\">Flowbite React<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"200\" style=\"background: #fffefb; border: 1px solid #e3dfd3; border-radius: 16px; padding: 24px 26px; transition: box-shadow 0.25s ease, transform 0.25s ease;\" style-hover=\"box-shadow: 0 10px 26px rgba(33,38,31,0.08); transform: translateY(-3px);\">\n        <div style=\"font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #9aa092; margin-bottom: 14px;\">Data &amp; Core<\u002Fdiv>\n        <div style=\"display: flex; flex-wrap: wrap; gap: 8px;\">\n          <span style=\"font-size: 12px; font-weight: 500; color: #21261f; background: #f6f4ee; border: 1px solid #e3dfd3; border-radius: 999px; padding: 5px 12px;\">MongoDB<\u002Fspan>\n          <span style=\"font-size: 12px; font-weight: 500; color: #21261f; background: #f6f4ee; border: 1px solid #e3dfd3; border-radius: 999px; padding: 5px 12px;\">DBMS<\u002Fspan>\n          <span style=\"font-size: 12px; font-weight: 500; color: #21261f; background: #f6f4ee; border: 1px solid #e3dfd3; border-radius: 999px; padding: 5px 12px;\">DSA<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"300\" style=\"background: #fffefb; border: 1px solid #e3dfd3; border-radius: 16px; padding: 24px 26px; transition: box-shadow 0.25s ease, transform 0.25s ease;\" style-hover=\"box-shadow: 0 10px 26px rgba(33,38,31,0.08); transform: translateY(-3px);\">\n        <div style=\"font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #9aa092; margin-bottom: 14px;\">Tools<\u002Fdiv>\n        <div style=\"display: flex; flex-wrap: wrap; gap: 8px;\">\n          <span style=\"font-size: 12px; font-weight: 500; color: #21261f; background: #f6f4ee; border: 1px solid #e3dfd3; border-radius: 999px; padding: 5px 12px;\">Git<\u002Fspan>\n          <span style=\"font-size: 12px; font-weight: 500; color: #21261f; background: #f6f4ee; border: 1px solid #e3dfd3; border-radius: 999px; padding: 5px 12px;\">Docker<\u002Fspan>\n          <span style=\"font-size: 12px; font-weight: 500; color: #21261f; background: #f6f4ee; border: 1px solid #e3dfd3; border-radius: 999px; padding: 5px 12px;\">VS Code<\u002Fspan>\n          <span style=\"font-size: 12px; font-weight: 500; color: #21261f; background: #f6f4ee; border: 1px solid #e3dfd3; border-radius: 999px; padding: 5px 12px;\">Cursor<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Contact -->\n  <div id=\"contact\" style=\"max-width: 1160px; margin: 0 auto; padding: 0 40px 56px;\">\n    <div data-reveal=\"0\" style=\"position: relative; overflow: hidden; background: linear-gradient(135deg, #103f78, #1a5dab); border-radius: 18px; padding: 60px 48px; text-align: center; color: #fffefb;\">\n      <div style=\"position: absolute; top: -120px; left: -80px; width: 340px; height: 340px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.10), rgba(255,255,255,0) 65%);\"><\u002Fdiv>\n      <div style=\"position: absolute; bottom: -140px; right: -60px; width: 380px; height: 380px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,0.07), rgba(255,255,255,0) 65%);\"><\u002Fdiv>\n      <div style=\"position: relative;\">\n        <div style=\"font-size: 12px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #aac6e8; margin-bottom: 14px;\">05 — Contact<\u002Fdiv>\n        <h2 style=\"margin: 0; font-size: 40px; font-weight: 600; letter-spacing: -0.01em; font-family: 'Source Serif 4', Georgia, serif;\">Let's build something together.<\u002Fh2>\n        <a href=\"mailto:hitenmehta1503@gmail.com\" style=\"display: inline-block; margin-top: 26px; font-size: 16px; font-weight: 600; color: #103f78; background: #fffefb; border-radius: 999px; padding: 15px 34px; text-decoration: none; transition: transform 0.2s ease, box-shadow 0.2s ease;\" style-hover=\"transform: translateY(-2px); box-shadow: 0 12px 28px rgba(0,0,0,0.25);\">hitenmehta1503@gmail.com<\u002Fa>\n        <div style=\"display: flex; justify-content: center; gap: 28px; margin-top: 28px; font-size: 14px; color: #aac6e8; flex-wrap: wrap;\">\n          <sc-if value=\"{{ showPhone }}\" hint-placeholder-val=\"{{ true }}\">\n            <span>+91 94689 25174<\u002Fspan>\n          <\u002Fsc-if>\n          <span>Udaipur, Rajasthan<\u002Fspan>\n          <a href=\"https://github.com/Hiten-15\" style=\"color: #aac6e8; text-decoration: none; transition: color 0.2s ease;\" style-hover=\"color: #fffefb;\">GitHub ↗<\u002Fa>\n          <a href=\"https://www.linkedin.com/in/hiten-mehta-70a234271/\" style=\"color: #aac6e8; text-decoration: none; transition: color 0.2s ease;\" style-hover=\"color: #fffefb;\">LinkedIn ↗<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display: flex; justify-content: space-between; align-items: center; padding: 24px 4px 0; font-size: 12px; color: #9aa092;\">\n      <span>© 2026 Hiten Mehta<\u002Fspan>\n      <a href=\"#top\" style=\"color: #1a5dab; text-decoration: none; font-weight: 600;\" style-hover=\"color: #103f78;\">↑ Back to top<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showAvailability&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Content&quot;},&quot;showPhone&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Content&quot;}}\">\nclass Component extends DCLogic {\n  state = { cgpa: '9.05', interns: 3, repos: 14, scrollPct: '0%' };\n\n  componentDidMount() {\n    // Count-up stats\n    const start = performance.now();\n    const dur = 1400;\n    const tick = (t) => {\n      const p = Math.min(1, (t - start) / dur);\n      const e = 1 - Math.pow(1 - p, 3);\n      this.setState({\n        cgpa: (9.05 * e).toFixed(2),\n        interns: Math.round(3 * e),\n        repos: Math.round(14 * e),\n      });\n      if (p < 1) this._raf = requestAnimationFrame(tick);\n    };\n    this._raf = requestAnimationFrame(tick);\n\n    // Scroll progress bar\n    this._onScroll = () => {\n      const h = document.documentElement;\n      const max = h.scrollHeight - h.clientHeight;\n      const pct = max > 0 ? (h.scrollTop / max) * 100 : 0;\n      this.setState({ scrollPct: pct.toFixed(1) + '%' });\n    };\n    document.addEventListener('scroll', this._onScroll, { passive: true, capture: true });\n    this._onScroll();\n\n    // Scroll-reveal\n    this._io = new IntersectionObserver((entries) => {\n      for (const en of entries) {\n        if (en.isIntersecting) {\n          const delay = parseFloat(en.target.getAttribute('data-reveal') || '0');\n          en.target.animate(\n            [{ opacity: 0, transform: 'translateY(28px)' }, { opacity: 1, transform: 'none' }],\n            { duration: 700, delay, easing: 'cubic-bezier(0.22, 1, 0.36, 1)', fill: 'backwards' }\n          );\n          this._io.unobserve(en.target);\n        }\n      }\n    }, { threshold: 0.15 });\n    document.querySelectorAll('[data-reveal]').forEach((el) => this._io.observe(el));\n  }\n\n  componentWillUnmount() {\n    cancelAnimationFrame(this._raf);\n    document.removeEventListener('scroll', this._onScroll, { capture: true });\n    if (this._io) this._io.disconnect();\n  }\n\n  renderVals() {\n    return {\n      cgpa: this.state.cgpa,\n      interns: this.state.interns,\n      repos: this.state.repos,\n      scrollPct: this.state.scrollPct,\n      showAvailability: this.props.showAvailability ?? true,\n      showPhone: this.props.showPhone ?? true,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

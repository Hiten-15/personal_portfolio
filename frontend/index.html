<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..700&display=swap"
      rel="stylesheet"
    />
    <title>Hiten Mehta — Portfolio</title>
    <!-- Prevent theme flash before React hydrates (Flowbite ThemeModeScript, Tailwind v3) -->
    <script>
      try {
        const storageMode = window.localStorage.getItem('flowbite-theme-mode');
        const isStorageModeValid =
          storageMode === 'light' || storageMode === 'dark' || storageMode === 'auto';
        const resolvedMode = (isStorageModeValid ? storageMode : null) ?? 'light';
        const computedMode =
          resolvedMode === 'auto'
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
            : resolvedMode;
        if (computedMode === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
        localStorage.setItem('flowbite-theme-mode', resolvedMode);
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
